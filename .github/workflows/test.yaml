name: Tests

on:
  pull_request:

jobs:
  unit-tests:
    uses: canonical/operator-workflows/.github/workflows/test.yaml@main
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit
    with:
      self-hosted-runner: false
      runs-on-base: ubuntu-24.04
      with-uv: true
      python-version: 3.12
